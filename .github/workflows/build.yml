name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      # Official vcpkg GitHub Actions binary cache (boost-json / catch2 build
      # from source — caching keeps repeat runs from rebuilding them).
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      # Put cl.exe + INCLUDE/LIB on PATH so the Ninja generator finds MSVC.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # vcpkg's x-gha backend reads these to talk to the Actions cache service.
      - name: Enable vcpkg binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # foobar2000 SDK is gitignored; CMake auto-downloads it on configure.
      # Cache the extracted tree so we don't re-fetch the 7z every run.
      - name: Cache foobar2000 SDK
        uses: actions/cache@v4
        with:
          path: foobar2000-SDK-2025-03-07
          key: fb2k-sdk-2025-03-07

      - name: Configure
        run: >
          cmake -S foo_hemusic -B foo_hemusic/build -G "Ninja Multi-Config"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          -DCMAKE_TOOLCHAIN_FILE=${env:VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build foo_hemusic/build --config Release

      - name: Test
        run: foo_hemusic/build/Release/hemusic_tests.exe

      - name: Upload component
        uses: actions/upload-artifact@v4
        with:
          name: foo_hemusic
          path: foo_hemusic/build/Release/foo_hemusic.dll
          if-no-files-found: error
